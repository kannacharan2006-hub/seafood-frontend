name: flutter_application_1
description: "OceanSync - Seafood Trading ERP. Manage purchases, sales, inventory & more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  google_fonts: ^6.2.1
  intl: ^0.19.0
  dio: ^5.4.3
  path_provider: ^2.1.3
  open_file: ^3.5.10
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0
  dropdown_search: ^5.0.6
  fl_chart: ^1.2.0
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.4.1
  web_socket_channel: ^3.0.3
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/logo.png
    - assets/icon/logo.png

  fonts:
    - family: TeluguFont
      fonts:
        - asset: assets/fonts/noto_sans_telugu_regular.ttf
        - asset: assets/fonts/noto_sans_telugu_bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/logo.png"
  adaptive_icon_background: "#203A43"
  adaptive_icon_foreground: "assets/icon/logo.png"

flutter_native_splash:
  color: "#203A43"
  image: assets/images/logo.png
  
  android: true
  ios: false